spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  # Exclude Redis auto-config — TestConfig provides mock beans instead
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

jwt:
  secret: agridirect_jwt_secret_key_must_be_32_chars_long_minimum
  expiration: 86400000

razorpay:
  key-id: test_key
  key-secret: test_secret
  webhook-secret: test_webhook

gemini:
  api-key: test_gemini_key
  api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

cloudinary:
  cloud-name: test
  api-key: test
  api-secret: test

server:
  port: 0
